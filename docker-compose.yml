version: "3.9"

services:
  rag:
    build: .
    container_name: rag_app
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_db:/app/chroma_db
    env_file:
      - .env
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data: